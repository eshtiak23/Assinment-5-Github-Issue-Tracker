<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

             <!-- Navbar Section -->
<nav class="bg-gray-800 px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-8">
<h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-3">

<input id="searchInput" placeholder="Search issues..."
class="bg-gray-700 px-3 py-2 rounded text-sm"/>

<button onclick="searchIssue()"
class="bg-purple-600 px-4 py-2 rounded text-sm">
Search </button>

</div>
</nav>


<div class="max-w-7xl mx-auto p-6">


                <!-- The Tab Section -->
<div class="bg-gray-800 p-4 rounded-lg flex gap-3 mb-6">

<button onclick="loadIssues()" class="tabBtn bg-pink-600 px-4 py-1 rounded"> All </button>

<button onclick="loadOpen()" class="tabBtn bg-gray-700 px-4 py-1 rounded">
Open </button>

<button onclick="loadClosed()" class="tabBtn bg-gray-700 px-4 py-1 rounded"> Closed </button>

</div>


                <!-- Issue Header  Section-->
<div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center mb-6">

<div>
<h2 class="text-lg font-semibold">
<span id="issueCount">0</span> Issues </h2>
<p class="text-gray-400 text-sm"> Track and manage your project issues </p>

</div>

<div class="flex gap-4 text-sm">
<span class="text-green-400">● Open</span>
<span class="text-purple-400">● Closed</span>
</div>

</div>

                <!-- Loading Section -->
<div id="loading" class="text-center hidden mb-4">
Loading issues...
</div>


<!-- Issues Grid Section.. -->
<div
id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

</div>

</div>

           <!-- Modal Section Here.. -->

<div
id="modal"
class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center"
>

<div class="bg-gray-800 p-6 rounded-lg max-w-lg w-full">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDesc" class="text-gray-300 mb-4"></p>

<div class="text-sm space-y-1">

<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Label:</b> <span id="modalLabel"></span></p>
<p><b>Date:</b> <span id="modalDate"></span></p>

</div>

<button onclick="closeModal()" class="mt-4 bg-Pink-600 px-4 py-2 rounded"> Close </button>

</div>

</div>


<!-- JS FILE -->
<script src="./script.js"></script>

</body>
</html>
