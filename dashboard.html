<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<!-- NAVBAR -->

<nav class="bg-gray-800 px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-8">
<h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-3">

<input
id="searchInput"
placeholder="Search issues..."
class="bg-gray-700 px-3 py-2 rounded text-sm"
/>

<button
onclick="searchIssue()"
class="bg-purple-600 px-4 py-2 rounded text-sm"

>

Search </button>

</div>

</nav>

<!-- MAIN -->

<div class="max-w-7xl mx-auto p-6">

<!-- TABS -->

<div class="bg-gray-800 p-4 rounded-lg flex gap-3 mb-6">

<button onclick="loadIssues()" class="tabBtn bg-purple-600 px-4 py-1 rounded">
All
</button>

<button onclick="loadOpen()" class="tabBtn bg-gray-700 px-4 py-1 rounded">
Open
</button>

<button onclick="loadClosed()" class="tabBtn bg-gray-700 px-4 py-1 rounded">
Closed
</button>

</div>

<!-- ISSUE HEADER -->

<div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center mb-6">

<div>
<h2 class="text-lg font-semibold">
<span id="issueCount">0</span> Issues
</h2>
<p class="text-gray-400 text-sm">
Track and manage your project issues
</p>
</div>

<div class="flex gap-4 text-sm">
<span class="text-green-400">● Open</span>
<span class="text-purple-400">● Closed</span>
</div>

</div>

<!-- LOADING -->

<div id="loading" class="text-center hidden mb-4">
Loading issues...
</div>

<!-- ISSUES GRID -->

<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
>
</div>

</div>

<!-- MODAL -->

<div
id="modal"
class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center"
>

<div class="bg-gray-800 p-6 rounded-lg max-w-lg w-full">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDesc" class="text-gray-300 mb-4"></p>

<div class="text-sm space-y-1">

<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Label:</b> <span id="modalLabel"></span></p>
<p><b>Date:</b> <span id="modalDate"></span></p>

</div>

<button
onclick="closeModal()"
class="mt-4 bg-purple-600 px-4 py-2 rounded"

>

Close </button>

</div>

</div>

<script>

const api = "https://phi-lab-server.vercel.app/api/v1/lab/issues"

let allIssues = []

window.onload = loadIssues



// LOAD ALL ISSUES
async function loadIssues(){

showLoading(true)

const res = await fetch(api)
const data = await res.json()

allIssues = data.data

displayIssues(allIssues)

showLoading(false)

}



// DISPLAY ISSUES
function displayIssues(issues){

const container = document.getElementById("issuesContainer")
container.innerHTML = ""

document.getElementById("issueCount").innerText = issues.length

issues.forEach(issue => {

const card = document.createElement("div")

let borderColor = issue.status === "open"
? "border-green-500"
: "border-purple-500"

card.className =
`bg-gray-800 p-4 rounded-lg border-t-4 ${borderColor} cursor-pointer`

card.innerHTML = `

<h3 class="font-semibold mb-1">${issue.title}</h3>

<p class="text-gray-400 text-sm mb-3">
${issue.description.substring(0,80)}...
</p>

<div class="flex gap-2 text-xs mb-2">

<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded">
${issue.priority}
</span>

<span class="bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded">
${issue.label}
</span>

</div>

<p class="text-xs text-gray-400">
#${issue.id} by ${issue.author}
</p>

<p class="text-xs text-gray-500">
${issue.createdAt}
</p>

`

card.onclick = () => openModal(issue)

container.appendChild(card)

})

}



// OPEN TAB
function loadOpen(){

const filtered = allIssues.filter(i => i.status === "open")
displayIssues(filtered)

}



// CLOSED TAB
function loadClosed(){

const filtered = allIssues.filter(i => i.status === "closed")
displayIssues(filtered)

}



// SEARCH
async function searchIssue(){

const text = document.getElementById("searchInput").value

showLoading(true)

const res = await fetch(
`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`
)

const data = await res.json()

displayIssues(data.data)

showLoading(false)

}



// MODAL
function openModal(issue){

document.getElementById("modal").classList.remove("hidden")
document.getElementById("modal").classList.add("flex")

document.getElementById("modalTitle").innerText = issue.title
document.getElementById("modalDesc").innerText = issue.description
document.getElementById("modalStatus").innerText = issue.status
document.getElementById("modalAuthor").innerText = issue.author
document.getElementById("modalPriority").innerText = issue.priority
document.getElementById("modalLabel").innerText = issue.label
document.getElementById("modalDate").innerText = issue.createdAt

}



// CLOSE MODAL
function closeModal(){

document.getElementById("modal").classList.add("hidden")

}



// LOADING
function showLoading(state){

document.getElementById("loading").classList.toggle("hidden", !state)

}

</script>

</body>
</html>
