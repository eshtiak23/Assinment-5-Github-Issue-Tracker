<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<!-- Navbar Section -->

<nav class="bg-gray-800 px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<img src="./Images/GitHub-Mark.png" class="w-8">
<h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-3">

<input id="searchInput" placeholder="Search issues..."class="bg-gray-700 px-3 py-2 rounded text-sm"/>

<button onclick="searchIssue()" class="bg-purple-600 px-4 py-2 rounded text-sm">Search </button>
</div>

</nav>


<div class="max-w-7xl mx-auto p-6">


<script>

// SEARCH
async function searchIssue(){

const text = document.getElementById("searchInput").value

showLoading(true)

const res = await fetch(
`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`
)

const data = await res.json()

displayIssues(data.data)

showLoading(false)

}

</script>

</body>
</html>
